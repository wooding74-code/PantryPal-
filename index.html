    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PantryPal: Crystal Edition</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=Bungee&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .font-bungee { font-family: 'Bungee', cursive; }
        .crystal-text {
            background: linear-gradient(135deg, #ffffff 0%, #a7f3d0 25%, #10b981 50%, #064e3b 75%, #ffffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: crystal-shine 4s linear infinite;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        @keyframes crystal-shine { to { background-position: 200% center; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect, createElement: el } = React;

        // Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBxyYEaHc0LhVqi-H5didL6Ma3aauWXDuk",
            authDomain: "pantrypal-628fd.firebaseapp.com",
            projectId: "pantrypal-628fd",
            storageBucket: "pantrypal-628fd.appspot.com",
            messagingSenderId: "236217367237",
            appId: "1:236217367237:web:4b83b3172c722797e88220"
        };
        const geminiApiKey = "AIzaSyBxyYEaHc0LhVqi-H5didL6Ma3aauWXDuk";

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function App() {
            const [user, setUser] = useState(null);
            const [kitchenId, setKitchenId] = useState("");
            const [isJoined, setIsJoined] = useState(false);
            const [items, setItems] = useState([]);
            const [inputValue, setInputValue] = useState("");
            const [isProcessing, setIsProcessing] = useState(false);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged((u) => {
                    if (u) setUser(u);
                    else auth.signInAnonymously();
                });
                return unsub;
            }, []);

            useEffect(() => {
                if (!user || !isJoined || !kitchenId) return;
                const path = `artifacts/pantry-pal-live/public/data/${kitchenId}`;
                return db.collection(path).orderBy('expiryDate', 'asc').onSnapshot(snap => {
                    setItems(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
            }, [user, isJoined, kitchenId]);

            const addItem = async () => {
                if (!inputValue.trim()) return;
                const path = `artifacts/pantry-pal-live/public/data/${kitchenId}`;
                await db.collection(path).add({
                    name: inputValue,
                    created: Date.now(),
                    expiryDate: Date.now() + (7 * 86400000)
                });
                setInputValue("");
            };

            const deleteItem = async (id) => {
                const path = `artifacts/pantry-pal-live/public/data/${kitchenId}`;
                await db.collection(path).doc(id).delete();
            };

            if (!isJoined) {
                return el('div', { className: "min-h-screen flex flex-col items-center justify-center p-6 text-center" }, [
                    el('div', { className: "text-8xl mb-6 animate-bounce" }, "🥘"),
                    el('h1', { className: "text-5xl font-bungee crystal-text mb-2" }, "PANTRY PAL"),
                    el('p', { className: "text-emerald-400 font-bold mb-8 tracking-widest text-xs" }, "PRO KITCHEN GUARD"),
                    el('input', { 
                        type: "text", placeholder: "KITCHEN ID", 
                        className: "w-full max-w-xs p-5 rounded-2xl bg-slate-900 border-2 border-emerald-900/50 text-white text-center mb-4 font-bold focus:border-emerald-500 outline-none",
                        onChange: (e) => setKitchenId(e.target.value.toUpperCase())
                    }),
                    el('button', { 
                        className: "w-full max-w-xs bg-emerald-500 text-slate-950 py-5 rounded-2xl font-black text-lg active:scale-95 transition-all",
                        onClick: () => kitchenId && setIsJoined(true)
                    }, "ACTIVATE")
                ]);
            }

            return el('div', { className: "pb-24" }, [
                el('header', { className: "pt-16 pb-20 bg-gradient-to-br from-emerald-900 to-slate-950 rounded-b-[50px] text-center shadow-xl" }, [
                    el('h1', { className: "text-4xl font-bungee crystal-text" }, "PANTRY PAL"),
                    el('div', { className: "mt-2 text-[10px] font-bold opacity-60 tracking-widest uppercase" }, `Unit: ${kitchenId}`)
                ]),
                el('main', { className: "max-w-md mx-auto px-6 -mt-10 space-y-4" }, [
                    el('div', { className: "flex gap-2 bg-slate-900 p-3 rounded-3xl border border-white/10" }, [
                        el('input', { 
                            type: "text", placeholder: "Add item...", value: inputValue,
                            onChange: (e) => setInputValue(e.target.value),
                            className: "flex-1 bg-transparent p-3 outline-none font-bold" 
                        }),
                        el('button', { onClick: addItem, className: "bg-emerald-500 text-slate-950 px-6 rounded-2xl font-black" }, "+")
                    ]),
                    el('div', { className: "space-y-2" }, items.map(item => el('div', { 
                        key: item.id, className: "bg-white/5 p-5 rounded-3xl flex justify-between items-center border border-white/5" 
                    }, [
                        el('span', { className: "font-bold" }, item.name),
                        el('button', { onClick: () => deleteItem(item.id), className: "text-rose-500 font-bold px-2" }, "✕")
                    ])))
                ])
            ]);
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(el(App));
    </script>
</body>
</html>
