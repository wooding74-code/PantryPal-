
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PantryPal: Crystal Edition</title>
    
    <!-- PWA Critical Headers -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#020617">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(() => console.log('PWA Engine Active'));
        });
      }
    </script>

    <!-- UI Engines -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Bungee&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#020617] text-slate-100 font-['Outfit'] antialiased selection:bg-emerald-500/30">
    <div id="root"></div>
    <script>
        const { useState, useEffect, createElement: el } = React;
        const firebaseConfig = {
            apiKey: "AIzaSyBxyYEaHc0LhVqi-H5didL6Ma3aauWXDuk",
            authDomain: "pantrypal-628fd.firebaseapp.com",
            projectId: "pantrypal-628fd",
            storageBucket: "pantrypal-628fd.appspot.com",
            messagingSenderId: "236217367237",
            appId: "1:236217367237:web:4b83b3172c722797e88220"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'pantry-pal-crystal-master';

        function App() {
            const [isJoined, setIsJoined] = useState(false);
            const [kitchenId, setKitchenId] = useState("");
            const [items, setItems] = useState([]);
            const [inputValue, setInputValue] = useState("");
            const [isLoading, setIsLoading] = useState(false);

            useEffect(() => { 
                auth.onAuthStateChanged(u => { if(!u) auth.signInAnonymously(); }); 
            }, []);

            useEffect(() => {
                if (!isJoined || !kitchenId) return;
                const path = `artifacts/${appId}/public/data/${kitchenId}`;
                return db.collection(path).orderBy('created', 'desc').onSnapshot(s => {
                    setItems(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [isJoined, kitchenId]);

            const addItem = async () => {
                if(!inputValue.trim()) return;
                setIsLoading(true);
                try {
                    await db.collection(`artifacts/${appId}/public/data/${kitchenId}`).add({ 
                        name: inputValue.trim(), 
                        created: Date.now() 
                    });
                    setInputValue("");
                } finally {
                    setIsLoading(false);
                }
            };

            if (!isJoined) {
                return el('div', { className: "fixed inset-0 flex flex-col items-center justify-center p-10 bg-[#020617] overflow-hidden" }, [
                    // Background Glows
                    el('div', { className: "absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-emerald-500/10 blur-[120px] rounded-full" }),
                    el('div', { className: "absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-blue-500/10 blur-[120px] rounded-full" }),
                    
                    el('div', { className: "relative z-10 w-full max-w-sm flex flex-col items-center" }, [
                        el('div', { className: "text-9xl mb-12 drop-shadow-[0_0_30px_rgba(16,185,129,0.3)] animate-[float_4s_ease-in-out_infinite]" }, "🥘"),
                        el('h1', { className: "text-6xl font-['Bungee'] crystal-text mb-2 text-center tracking-tight" }, "PANTRY PAL"),
                        el('p', { className: "text-emerald-500/60 font-black tracking-[0.3em] text-[10px] mb-12 uppercase" }, "Crystal Edition"),
                        
                        el('div', { className: "w-full space-y-4" }, [
                            el('input', { 
                                placeholder: "ENTER KITCHEN ID", 
                                className: "w-full p-6 rounded-[2rem] bg-slate-900/50 border-2 border-white/5 text-center text-white outline-none focus:border-emerald-500/50 transition-all font-bold placeholder:opacity-30", 
                                onChange: e => setKitchenId(e.target.value.toUpperCase()),
                                onKeyPress: e => e.key === 'Enter' && kitchenId && setIsJoined(true)
                            }),
                            el('button', { 
                                className: "w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 py-6 rounded-[2.5rem] font-black text-xl shadow-[0_20px_40px_rgba(16,185,129,0.2)] active:scale-95 transition-all uppercase tracking-widest", 
                                onClick: () => kitchenId && setIsJoined(true) 
                            }, "ACTIVATE")
                        ])
                    ])
                ]);
            }

            return el('div', { className: "min-h-screen bg-[#020617] pb-24" }, [
                // Header section
                el('header', { className: "pt-24 pb-32 text-center bg-gradient-to-br from-[#064e3b] to-[#022c22] rounded-b-[70px] shadow-2xl relative overflow-hidden" }, [
                    el('div', { className: "absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none" }, 
                        el('div', { className: "absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white via-transparent to-transparent scale-150" })
                    ),
                    el('h1', { className: "text-5xl font-['Bungee'] crystal-text uppercase relative z-10" }, "PANTRY PAL"),
                    el('div', { className: "mt-4 inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-black/20 border border-white/5 relative z-10" }, [
                        el('div', { className: "w-2 h-2 rounded-full bg-emerald-500 animate-pulse" }),
                        el('span', { className: "text-[10px] font-black tracking-widest opacity-80 uppercase" }, `ID: ${kitchenId}`)
                    ])
                ]),

                // Main Content
                el('main', { className: "max-w-md mx-auto px-6 -mt-16 space-y-6 relative z-10" }, [
                    // Input Card
                    el('div', { className: "bg-slate-900/80 backdrop-blur-xl p-6 rounded-[3rem] border border-white/10 shadow-2xl flex gap-3" }, [
                        el('input', { 
                            placeholder: "What's in the kitchen?", 
                            value: inputValue, 
                            className: "flex-1 bg-black/40 p-5 rounded-2xl text-white outline-none border border-white/5 focus:border-emerald-500/30 transition-all", 
                            onChange: e => setInputValue(e.target.value),
                            onKeyPress: e => e.key === 'Enter' && addItem()
                        }),
                        el('button', { 
                            onClick: addItem, 
                            disabled: isLoading,
                            className: `bg-emerald-500 text-slate-950 w-16 h-16 rounded-2xl font-black text-2xl shadow-lg active:scale-90 transition-all ${isLoading ? 'opacity-50' : ''}` 
                        }, isLoading ? "..." : "+")
                    ]),

                    // List
                    el('div', { className: "space-y-3" }, items.length === 0 ? [
                        el('div', { className: "text-center py-20 opacity-20 flex flex-col items-center" }, [
                            el('div', { className: "text-6xl mb-4" }, "🧊"),
                            el('p', { className: "font-bold italic" }, "Kitchen is empty...")
                        ])
                    ] : items.map(i => el('div', { 
                        key: i.id, 
                        className: "group bg-white/5 backdrop-blur-md p-6 rounded-[2.5rem] flex justify-between items-center border border-white/5 hover:border-emerald-500/20 transition-all shadow-lg animate-[slideIn_0.3s_ease-out]" 
                    }, [
                        el('span', { className: "font-bold text-lg" }, i.name),
                        el('button', { 
                            onClick: () => db.collection(`artifacts/${appId}/public/data/${kitchenId}`).doc(i.id).delete(), 
                            className: "text-rose-500/40 hover:text-rose-500 px-4 py-2 transition-colors font-bold text-xl" 
                        }, "✕")
                    ])))
                ]),

                // Global Styles
                el('style', null, `
                    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
                    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                    .crystal-text { 
                        background: linear-gradient(135deg, #fff 0%, #a7f3d0 50%, #fff 100%); 
                        -webkit-background-clip: text; 
                        -webkit-text-fill-color: transparent; 
                        filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
                    }
                `)
            ]);
        }
        ReactDOM.createRoot(document.getElementById('root')).render(el(App));
    </script>
</body>
</html>
