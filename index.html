<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PantryPal: Diamond Edition</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Bungee&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#020617] text-slate-100 font-['Outfit'] antialiased overflow-x-hidden">
    <div id="root"></div>
    <script>
        const { useState, useEffect, useRef, createElement: el } = React;
        const apiKey = "AIzaSyBxyYEaHc0LhVqi-H5didL6Ma3aauWXDuk";
        const firebaseConfig = {
            apiKey: "AIzaSyBxyYEaHc0LhVqi-H5didL6Ma3aauWXDuk",
            authDomain: "pantrypal-628fd.firebaseapp.com",
            projectId: "pantrypal-628fd",
            storageBucket: "pantrypal-628fd.appspot.com",
            messagingSenderId: "236217367237",
            appId: "1:236217367237:web:4b83b3172c722797e88220"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function pcmToWav(pcmData, sampleRate) {
            const buffer = new ArrayBuffer(44 + pcmData.length);
            const view = new DataView(buffer);
            const writeString = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
            writeString(0, 'RIFF'); view.setUint32(4, 36 + pcmData.length, true);
            writeString(8, 'WAVE'); writeString(12, 'fmt '); view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true);
            writeString(36, 'data'); view.setUint32(40, pcmData.length, true);
            for (let i = 0; i < pcmData.length; i++) view.setUint8(44 + i, pcmData[i]);
            return new Blob([buffer], { type: 'audio/wav' });
        }

        function App() {
            const [isJoined, setIsJoined] = useState(false);
            const [kitchenId, setKitchenId] = useState("");
            const [items, setItems] = useState([]);
            const [inputValue, setInputValue] = useState("");
            const [recipe, setRecipe] = useState("");
            const [isThinking, setIsThinking] = useState(false);
            const [showCamera, setShowCamera] = useState(false);

            useEffect(() => {
                if (!isJoined || !kitchenId) return;
                return db.collection(`artifacts/pantry-pal-final/public/data/${kitchenId}`).orderBy('created', 'desc').onSnapshot(s => {
                    setItems(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [isJoined, kitchenId]);

            const speak = async (text) => {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${apiKey}`, {
                        method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text }] }], generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } } } )
                    });
                    const data = await res.json();
                    const audio = new Audio(URL.createObjectURL(pcmToWav(Uint8Array.from(atob(data.candidates[0].content.parts[0].inlineData.data), c => c.charCodeAt(0)), 24000)));
                    audio.play();
                } catch (e) { console.error(e); }
            };

            const handleManualAdd = async () => {
                if(!inputValue.trim()) return;
                const newItem = inputValue;
                setInputValue(""); 
                await db.collection(`artifacts/pantry-pal-final/public/data/${kitchenId}`).add({ name: newItem, created: Date.now() });
            };

            const generateRecipe = async (mode) => {
                if (items.length === 0) return alert("Add items first!");
                setIsThinking(true);
                setRecipe("");
                const prompt = mode === 'healthy' 
                    ? `I have: ${items.map(i => i.name).join(", ")}. Give a healthy recipe name, 3 steps, and allergy advice.`
                    : `I have: ${items.map(i => i.name).join(", ")}. Give a recipe name and 3 steps.`;
                
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${apiKey}`, {
                        method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await res.json();
                    setRecipe(data.candidates[0].content.parts[0].text);
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    speak("Recipe ready!");
                } catch (e) { setRecipe("Chef is busy!"); }
                setIsThinking(false);
            };

            if (!isJoined) {
                return el('div', { className: "fixed inset-0 flex flex-col items-center justify-center p-10 bg-[#020617]" }, [
                    // --- Original Spinning Dish ---
                    el('div', { className: "relative w-48 h-48 mb-12 animate-[spin_15s_linear_infinite]" }, [
                        el('div', { className: "absolute inset-0 rounded-full border-4 border-emerald-500/20 shadow-[0_0_50px_rgba(16,185,129,0.2)]" }),
                        el('div', { className: "absolute inset-4 rounded-full border-2 border-dashed border-white/10" }),
                        el('div', { className: "absolute inset-0 flex items-center justify-center text-8xl drop-shadow-2xl" }, "🍽️")
                    ]),
                    el('h1', { className: "text-6xl font-['Bungee'] diamond-text mb-2 text-center" }, "PANTRY PAL"),
                    el('p', { className: "text-emerald-500/40 font-black tracking-[0.5em] text-[10px] mb-12 uppercase" }, "Diamond Sovereign"),
                    el('div', { className: "w-full max-w-xs space-y-4" }, [
                        el('input', { placeholder: "ENTER KITCHEN ID", className: "w-full p-6 rounded-[2rem] bg-slate-900 border-2 border-white/5 text-center font-bold text-white", onChange: e => setKitchenId(e.target.value.toUpperCase()) }),
                        el('button', { className: "w-full bg-emerald-500 text-slate-950 py-6 rounded-[2.5rem] font-black text-xl shadow-[0_20px_40px_rgba(16,185,129,0.3)] active:scale-95 transition-all", onClick: () => kitchenId && setIsJoined(true) }, "ACTIVATE")
                    ])
                ]);
            }

            return el('div', { className: "min-h-screen bg-[#020617] pb-24" }, [
                el('header', { className: "pt-20 pb-32 text-center bg-gradient-to-br from-[#064e3b] to-[#022c22] rounded-b-[60px] shadow-2xl relative overflow-hidden" }, [
                    el('div', { className: "absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]" }),
                    el('h1', { className: "text-4xl font-['Bungee'] diamond-text uppercase relative z-10" }, "PANTRY PAL"),
                    el('div', { className: "mt-4 inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-black/20 border border-white/5 relative z-10" }, [
                        el('span', { className: "text-[10px] font-black tracking-widest opacity-80 uppercase" }, `KITCHEN ID: ${kitchenId}`)
                    ])
                ]),

                el('main', { className: "max-w-md mx-auto px-6 -mt-16 space-y-6 relative z-10" }, [
                    el('div', { className: "bg-slate-900/90 backdrop-blur-2xl p-6 rounded-[3rem] border border-white/10 shadow-2xl relative overflow-hidden" }, [
                        isThinking && el('div', { className: "absolute top-0 left-0 w-full h-1 bg-white/5" }, [
                            el('div', { className: "h-full bg-emerald-400 animate-[loading_1.5s_infinite]" })
                        ]),
                        el('div', { className: "flex items-center bg-black/40 rounded-2xl p-2 mb-4 mt-2" }, [
                            el('input', { value: inputValue, placeholder: "Manual Add...", className: "flex-1 bg-transparent p-3 outline-none text-white", onChange: e => setInputValue(e.target.value), onKeyPress: e => e.key === 'Enter' && handleManualAdd() }),
                            el('button', { onClick: handleManualAdd, className: "bg-emerald-500 text-black w-12 h-12 rounded-xl font-black text-xl active:scale-90" }, "+")
                        ]),
                        el('div', { className: "grid grid-cols-2 gap-3 mb-3" }, [
                            el('button', { onClick: () => generateRecipe('normal'), className: "py-4 bg-emerald-500 text-black rounded-2xl font-black text-[10px] uppercase shadow-lg active:scale-95" }, "✨ GET RECIPE"),
                            el('button', { onClick: () => generateRecipe('healthy'), className: "py-4 bg-white/5 border border-emerald-500/30 text-emerald-400 rounded-2xl font-black text-[10px] uppercase active:scale-95" }, "🥗 HEALTHY")
                        ]),
                        el('div', { className: "flex gap-3" }, [
                            el('button', { onClick: () => setShowCamera(true), className: "flex-1 py-4 bg-white/5 rounded-2xl font-bold text-[10px] uppercase border border-white/5" }, "📷 SCAN"),
                            el('button', { onClick: () => speak("Listening for your command, Dj."), className: "flex-1 py-4 bg-white/5 rounded-2xl font-bold text-[10px] uppercase border border-white/5" }, "🔊 TALK")
                        ])
                    ]),

                    recipe && el('div', { className: "bg-emerald-500/10 p-6 rounded-[2.5rem] border border-emerald-500/20 shadow-xl animate-[slideIn_0.3s_ease-out]" }, [
                        el('div', { className: "flex justify-between mb-4" }, [
                            el('span', { className: "text-[10px] font-black text-emerald-400 uppercase tracking-widest" }, "Chef's Plan"),
                            el('button', { onClick: () => speak(recipe), className: "text-lg" }, "🔊")
                        ]),
                        el('div', { className: "text-sm whitespace-pre-wrap leading-relaxed opacity-90" }, recipe)
                    ]),

                    el('div', { className: "space-y-3" }, items.map(i => el('div', { key: i.id, className: "bg-white/5 backdrop-blur-md p-5 rounded-[2.5rem] flex justify-between items-center border border-white/5 shadow-lg" }, [
                        el('div', { className: "flex items-center gap-4" }, [
                            el('button', { onClick: () => speak(i.name), className: "opacity-30 hover:opacity-100" }, "🔊"),
                            el('span', { className: "font-bold text-lg" }, i.name)
                        ]),
                        el('button', { onClick: () => db.collection(`artifacts/pantry-pal-final/public/data/${kitchenId}`).doc(i.id).delete(), className: "text-rose-500/40 px-4" }, "✕")
                    ])))
                ]),

                el('style', null, `
                    @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
                    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                    @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
                    .diamond-text { 
                        background: linear-gradient(90deg, #fff 0%, #a7f3d0 25%, #fff 50%, #a7f3d0 75%, #fff 100%);
                        background-size: 200% auto;
                        -webkit-background-clip: text;
                        -webkit-text-fill-color: transparent;
                        animation: shimmer 4s linear infinite;
                        font-weight: 900;
                        filter: drop-shadow(0 0 10px rgba(167,243,208,0.3));
                    }
                `)
            ]);
        }
        ReactDOM.createRoot(document.getElementById('root')).render(el(App));
    </script>
</body>
</html>
