<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PantryPal - AI Kitchen Assistant</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Bungee&display=swap" rel="stylesheet">
    <style>
        .sparkle-text {
            background: linear-gradient(120deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0.9) 15%, rgba(167, 243, 208, 0.7) 30%, rgba(16, 185, 129, 0.9) 50%, rgba(167, 243, 208, 0.7) 70%, rgba(255, 255, 255, 0.9) 85%, rgba(255, 255, 255, 0.4) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 15s linear infinite;
            filter: drop-shadow(0 0 15px rgba(16, 185, 129, 0.4)) drop-shadow(0 4px 6px rgba(0, 0, 0, 0.6));
        }
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        .shimmer-bg-green {
            background: linear-gradient(
                120deg,
                rgba(16, 185, 129, 0.05) 0%,
                rgba(16, 185, 129, 0.15) 25%,
                rgba(52, 211, 153, 0.25) 50%,
                rgba(16, 185, 129, 0.15) 75%,
                rgba(16, 185, 129, 0.05) 100%
            );
            background-size: 200% auto;
            animation: shimmer 15s linear infinite;
        }
    </style>
</head>
<body class="bg-[#020617] text-slate-100 font-['Outfit']">
    <div id="root"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef, createElement: el } = React;
        
        // --- 1. YOUR API KEY ---
        // For Preview: Leave as "". For GitHub/Vercel: Paste your AI Studio key.
        const apiKey = "AIzaSyCXJlSQUdETdHkn_wDqBS_aqqapHsUkWuE"; 

        // --- 2. YOUR FIREBASE CONFIG ---
        // Replace this with your own config from Firebase Console for GitHub/Vercel.
        let firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        // Environment fallback logic
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'pantry-pal-app';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
            const [user, setUser] = useState(null);
            const [isJoined, setIsJoined] = useState(false);
            const [kitchenId, setKitchenId] = useState("");
            const [items, setItems] = useState([]);
            const [inputValue, setInputValue] = useState("");
            const [recipe, setRecipe] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const [progress, setProgress] = useState(0);
            const [progressText, setProgressText] = useState("");
            const [shareLabel, setShareLabel] = useState("🔗 SHARE RECIPE");
            
            const progressInterval = useRef(null);

            const startProgress = (text) => {
                setProgress(0);
                setProgressText(text);
                setIsLoading(true);
                setRecipe(""); 
                if (progressInterval.current) clearInterval(progressInterval.current);
                progressInterval.current = setInterval(() => {
                    setProgress(p => (p > 90 ? 90 : p + Math.random() * 8));
                }, 500);
            };

            const finishProgress = () => {
                if (progressInterval.current) clearInterval(progressInterval.current);
                setProgress(100);
                setProgressText("Done!");
            };

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !isJoined || !kitchenId) return;
                const itemsRef = collection(db, 'artifacts', appId, 'public', 'data', kitchenId);
                const unsub = onSnapshot(itemsRef, (s) => {
                    const fetched = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    fetched.sort((a, b) => b.created - a.created);
                    setItems(fetched);
                });
                return () => unsub();
            }, [user, isJoined, kitchenId]);

            const speakText = (text) => {
                const cleanText = text.replace(/[*_#`~]/g, '').trim();
                const ut = new SpeechSynthesisUtterance(cleanText);
                ut.pitch = 0.8;
                ut.rate = 1.1;
                window.speechSynthesis.speak(ut);
            };

            const handleAdd = async () => {
                if(!inputValue.trim() || !user) return;
                const val = inputValue.trim();
                setInputValue(""); 
                const itemsRef = collection(db, 'artifacts', appId, 'public', 'data', kitchenId);
                await addDoc(itemsRef, { name: val, created: Date.now() });
            };

            const handleDelete = async (id) => {
                const itemDoc = doc(db, 'artifacts', appId, 'public', 'data', kitchenId, id);
                await deleteDoc(itemDoc);
            };

            const runAI = async (type) => {
                if (!items.length) return;
                startProgress(type === 'health' ? "Analyzing diet..." : "Cooking...");

                const model = apiKey === "" ? "gemini-2.5-flash-preview-09-2025" : "gemini-1.5-flash";
                const ingredients = items.map(i => i.name).join(", ");
                
                const prompt = type === 'health' 
                    ? `Gordon Ramsay style analysis of: ${ingredients}. HTML bullet points only. Allergens in bold red: <strong style="color: #ef4444; font-weight: 900;">ALLERGY WARNING: [Info]</strong>. Just raw HTML.`
                    : `Gordon Ramsay style recipe for: ${ingredients}. Title and 3 steps. No markdown.`;

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await res.json();
                    let text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Error.";
                    if (type === 'health') text = text.replace(/```html\n?/gi, '').replace(/```\n?/g, '').trim();

                    finishProgress();
                    setTimeout(() => {
                        setRecipe(text);
                        setIsLoading(false);
                        if (type !== 'health') confetti();
                    }, 500);
                } catch (e) {
                    setIsLoading(false);
                    setRecipe("Connection error!");
                }
            };

            const handleShare = async () => {
                if (navigator.share) {
                    try { await navigator.share({ title: 'PantryPal Recipe', text: recipe }); return; } catch (e) {}
                }
                const textArea = document.createElement("textarea");
                textArea.value = recipe;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setShareLabel("✅ COPIED!");
                setTimeout(() => setShareLabel("🔗 SHARE RECIPE"), 2000);
            };

            if (!isJoined) {
                return el('div', { className: "min-h-screen flex flex-col items-center justify-center px-6" }, [
                    el('h1', { className: "text-6xl font-['Bungee'] mb-8 sparkle-text text-center" }, "PANTRY PAL"),
                    el('input', { 
                        placeholder: "KITCHEN STATION ID", 
                        className: "p-5 rounded-2xl bg-slate-900 border border-white/10 text-white mb-4 text-center w-full max-w-xs", 
                        onChange: e => setKitchenId(e.target.value.toUpperCase()) 
                    }),
                    el('button', { 
                        className: "bg-emerald-500 text-white px-12 py-5 rounded-2xl font-black w-full max-w-xs shadow-lg", 
                        onClick: () => kitchenId && setIsJoined(true) 
                    }, "ACTIVATE")
                ]);
            }

            return el('div', { className: "max-w-2xl mx-auto py-16 px-6" }, [
                el('header', { className: "text-center mb-12" }, [
                    el('h1', { className: "text-5xl font-['Bungee'] sparkle-text" }, "PANTRY PAL"),
                    el('p', { className: "text-emerald-500 font-bold tracking-widest mt-2" }, `STATION: ${kitchenId}`)
                ]),
                el('div', { className: "bg-slate-900 p-8 rounded-[2rem] border border-white/10 mb-10" }, [
                    el('div', { className: "flex gap-2 mb-6" }, [
                        el('input', { 
                            value: inputValue, 
                            placeholder: "Add item...", 
                            className: "flex-1 bg-black p-4 rounded-xl text-white outline-none border border-white/5 focus:border-emerald-500/50", 
                            onChange: e => setInputValue(e.target.value),
                            onKeyPress: e => e.key === 'Enter' && handleAdd()
                        }),
                        el('button', { onClick: handleAdd, className: "bg-emerald-500 text-white px-6 rounded-xl font-bold" }, "ADD")
                    ]),
                    el('div', { className: "grid grid-cols-2 gap-3" }, [
                        el('button', { onClick: () => runAI('recipe'), className: "bg-slate-800 py-4 rounded-xl font-black" }, "📝 RECIPE"),
                        el('button', { onClick: () => runAI('health'), className: "bg-emerald-500 py-4 rounded-xl font-black" }, "🩺 HEALTH")
                    ])
                ]),
                isLoading && el('div', { className: "bg-slate-900 p-6 rounded-[2rem] border border-emerald-500/30 mb-10" }, [
                    el('div', { className: "flex justify-between items-end mb-3 font-bold text-xs" }, [
                        el('span', { className: "text-emerald-400" }, progressText),
                        el('span', { className: "text-emerald-500" }, Math.round(progress) + "%")
                    ]),
                    el('div', { className: "w-full bg-slate-800 rounded-full h-3 overflow-hidden" }, [
                        el('div', { className: "bg-emerald-500 h-full rounded-full transition-all duration-300", style: { width: `${progress}%` } })
                    ])
                ]),
                recipe && !isLoading && el('div', { className: "shimmer-bg-green p-8 rounded-3xl mb-10 border border-emerald-500/40 relative backdrop-blur-sm shadow-xl" }, [
                    el('div', { 
                        className: "whitespace-pre-wrap text-sm mb-6 text-emerald-50 font-medium leading-relaxed [&>ul]:list-disc [&>ul]:pl-5",
                        dangerouslySetInnerHTML: { __html: recipe } 
                    }),
                    el('div', { className: "flex flex-col sm:flex-row gap-3" }, [
                        el('button', { onClick: () => speakText(recipe), className: "flex-1 bg-emerald-500 text-white py-4 rounded-xl font-black" }, "🔊 HEAR CHEF"),
                        el('button', { onClick: handleShare, className: "flex-1 bg-slate-800 text-emerald-400 py-4 rounded-xl font-black" }, shareLabel)
                    ])
                ]),
                el('div', { className: "space-y-4" }, items.map(i => el('div', { key: i.id, className: "bg-white/5 p-5 rounded-2xl flex justify-between items-center" }, [
                    el('span', { className: "text-lg font-bold" }, i.name),
                    el('button', { onClick: () => handleDelete(i.id), className: "text-rose-500 font-black p-2" }, "✕")
                ])))
            ]);
        }
        ReactDOM.createRoot(document.getElementById('root')).render(el(App));
    </script>
</body>
</html>
