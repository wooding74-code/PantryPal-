<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PantryPal: Crystal Edition</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#020617">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Bungee&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#020617] text-slate-100 font-['Outfit'] antialiased selection:bg-emerald-500/30 overflow-x-hidden">
    <div id="root"></div>
    <script>
        const { useState, useEffect, useRef, createElement: el } = React;
        const apiKey = ""; // Environment provides the key
        
        const firebaseConfig = {
            apiKey: "AIzaSyBxyYEaHc0LhVqi-H5didL6Ma3aauWXDuk",
            authDomain: "pantrypal-628fd.firebaseapp.com",
            projectId: "pantrypal-628fd",
            storageBucket: "pantrypal-628fd.appspot.com",
            messagingSenderId: "236217367237",
            appId: "1:236217367237:web:4b83b3172c722797e88220"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'pantry-pal-final-master';

        // --- Utility: PCM to WAV for Gemini TTS ---
        function pcmToWav(pcmData, sampleRate) {
            const buffer = new ArrayBuffer(44 + pcmData.length);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + pcmData.length, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length, true);
            for (let i = 0; i < pcmData.length; i++) view.setUint8(44 + i, pcmData[i]);
            return new Blob([buffer], { type: 'audio/wav' });
        }

        function App() {
            const [isJoined, setIsJoined] = useState(false);
            const [kitchenId, setKitchenId] = useState("");
            const [items, setItems] = useState([]);
            const [inputValue, setInputValue] = useState("");
            const [isAnalysing, setIsAnalysing] = useState(false);
            const [showCamera, setShowCamera] = useState(false);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);

            useEffect(() => { 
                auth.onAuthStateChanged(u => { if(!u) auth.signInAnonymously(); }); 
            }, []);

            useEffect(() => {
                if (!isJoined || !kitchenId) return;
                return db.collection(`artifacts/${appId}/public/data/${kitchenId}`).orderBy('created', 'desc').onSnapshot(s => {
                    setItems(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [isJoined, kitchenId]);

            // --- Voice: Gemini TTS ---
            const speak = async (text) => {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Say clearly: ${text}` }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                            }
                        })
                    });
                    const result = await response.json();
                    const base64Audio = result.candidates[0].content.parts[0].inlineData.data;
                    const audioData = Uint8Array.from(atob(base64Audio), c => c.charCodeAt(0));
                    const wavBlob = pcmToWav(audioData, 24000);
                    const audio = new Audio(URL.createObjectURL(wavBlob));
                    audio.play();
                } catch (e) { console.error("TTS Error", e); }
            };

            // --- Eyes: Gemini Vision ---
            const startCamera = async () => {
                setShowCamera(true);
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                if (videoRef.current) videoRef.current.srcObject = stream;
            };

            const captureAndAnalyse = async () => {
                setIsAnalysing(true);
                const canvas = canvasRef.current;
                const video = videoRef.current;
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const base64Image = canvas.toDataURL('image/png').split(',')[1];
                
                // Stop camera
                video.srcObject.getTracks().forEach(track => track.stop());
                setShowCamera(false);

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "What is the name of this food item? Answer with only the name." },
                                    { inlineData: { mimeType: "image/png", data: base64Image } }
                                ]
                            }]
                        })
                    });
                    const result = await response.json();
                    const itemName = result.candidates[0].content.parts[0].text.trim();
                    if (itemName) {
                        await db.collection(`artifacts/${appId}/public/data/${kitchenId}`).add({ 
                            name: itemName, 
                            created: Date.now() 
                        });
                        speak(`Added ${itemName}`);
                    }
                } catch (e) { console.error("Vision Error", e); }
                setIsAnalysing(false);
            };

            if (!isJoined) {
                return el('div', { className: "fixed inset-0 flex flex-col items-center justify-center p-10 bg-[#020617]" }, [
                    el('div', { className: "absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-emerald-500/10 blur-[120px] rounded-full" }),
                    el('div', { className: "text-9xl mb-12 drop-shadow-[0_0_30px_rgba(16,185,129,0.3)] animate-[float_4s_ease-in-out_infinite]" }, "🥘"),
                    el('h1', { className: "text-6xl font-['Bungee'] crystal-text mb-2 text-center" }, "PANTRY PAL"),
                    el('p', { className: "text-emerald-500/60 font-black tracking-[0.3em] text-[10px] mb-12 uppercase" }, "Crystal Edition"),
                    el('input', { placeholder: "KITCHEN ID", className: "w-full max-w-xs p-6 rounded-[2rem] bg-slate-900/50 border-2 border-white/5 text-center text-white mb-4 outline-none", onChange: e => setKitchenId(e.target.value.toUpperCase()) }),
                    el('button', { className: "w-full max-w-xs bg-emerald-500 text-slate-950 py-6 rounded-[2.5rem] font-black text-xl shadow-2xl", onClick: () => kitchenId && setIsJoined(true) }, "ACTIVATE")
                ]);
            }

            return el('div', { className: "min-h-screen bg-[#020617] pb-24" }, [
                el('header', { className: "pt-24 pb-32 text-center bg-gradient-to-br from-[#064e3b] to-[#022c22] rounded-b-[70px] shadow-2xl relative" }, [
                    el('h1', { className: "text-5xl font-['Bungee'] crystal-text uppercase" }, "PANTRY PAL"),
                    el('div', { className: "mt-4 inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-black/20 border border-white/5" }, [
                        el('div', { className: "w-2 h-2 rounded-full bg-emerald-500 animate-pulse" }),
                        el('span', { className: "text-[10px] font-black tracking-widest opacity-80 uppercase" }, `ID: ${kitchenId}`)
                    ])
                ]),

                el('main', { className: "max-w-md mx-auto px-6 -mt-16 space-y-6" }, [
                    // UI Card
                    el('div', { className: "bg-slate-900/80 backdrop-blur-xl p-6 rounded-[3rem] border border-white/10 shadow-2xl space-y-4" }, [
                        el('div', { className: "flex gap-2" }, [
                            el('input', { placeholder: "Add item...", value: inputValue, className: "flex-1 bg-black/40 p-5 rounded-2xl text-white outline-none border border-white/5", onChange: e => setInputValue(e.target.value) }),
                            el('button', { onClick: async () => { if(!inputValue) return; await db.collection(`artifacts/${appId}/public/data/${kitchenId}`).add({ name: inputValue, created: Date.now() }); setInputValue(""); }, className: "bg-emerald-500 text-slate-950 w-14 h-14 rounded-2xl font-black" }, "+")
                        ]),
                        el('div', { className: "flex justify-around pt-2" }, [
                            el('button', { onClick: startCamera, className: "p-4 bg-white/5 rounded-2xl hover:bg-emerald-500/20 transition-all" }, "👁️ Scan Food"),
                            el('button', { onClick: () => speak("Welcome to Pantry Pal, your AI kitchen is ready."), className: "p-4 bg-white/5 rounded-2xl hover:bg-emerald-500/20 transition-all" }, "🔊 Test Voice")
                        ])
                    ]),

                    // List
                    el('div', { className: "space-y-3" }, items.map(i => el('div', { key: i.id, className: "bg-white/5 backdrop-blur-md p-6 rounded-[2.5rem] flex justify-between items-center border border-white/5 shadow-lg animate-[slideIn_0.3s_ease-out]" }, [
                        el('div', { className: "flex items-center gap-4" }, [
                            el('button', { onClick: () => speak(i.name), className: "opacity-40 hover:opacity-100" }, "🔊"),
                            el('span', { className: "font-bold text-lg" }, i.name)
                        ]),
                        el('button', { onClick: () => db.collection(`artifacts/${appId}/public/data/${kitchenId}`).doc(i.id).delete(), className: "text-rose-500/40 px-4" }, "✕")
                    ])))
                ]),

                // Camera Modal
                showCamera && el('div', { className: "fixed inset-0 z-50 bg-black flex flex-col items-center" }, [
                    el('video', { ref: videoRef, autoPlay: true, playsInline: true, className: "flex-1 w-full object-cover" }),
                    el('div', { className: "p-10 flex gap-10" }, [
                        el('button', { onClick: () => setShowCamera(false), className: "bg-white/20 px-8 py-4 rounded-2xl font-bold" }, "Cancel"),
                        el('button', { onClick: captureAndAnalyse, disabled: isAnalysing, className: "bg-emerald-500 text-black px-12 py-4 rounded-2xl font-black" }, isAnalysing ? "Analysing..." : "Capture")
                    ]),
                    el('canvas', { ref: canvasRef, className: "hidden" })
                ]),

                el('style', null, `
                    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
                    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                    .crystal-text { background: linear-gradient(135deg, #fff 0%, #a7f3d0 50%, #fff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4)); }
                `)
            ]);
        }
        ReactDOM.createRoot(document.getElementById('root')).render(el(App));
    </script>
</body>
</html>
