
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PantryPal: Crystal Edition</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#020617">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Bungee&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#020617] text-slate-100 font-['Outfit'] antialiased overflow-x-hidden">
    <div id="root"></div>
    <script>
        const { useState, useEffect, useRef, createElement: el } = React;
        const apiKey = "AIzaSyBxyYEaHc0LhVqi-H5didL6Ma3aauWXDuk";
        const firebaseConfig = {
            apiKey: "AIzaSyBxyYEaHc0LhVqi-H5didL6Ma3aauWXDuk",
            authDomain: "pantrypal-628fd.firebaseapp.com",
            projectId: "pantrypal-628fd",
            storageBucket: "pantrypal-628fd.appspot.com",
            messagingSenderId: "236217367237",
            appId: "1:236217367237:web:4b83b3172c722797e88220"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'pantry-pal-final-master';

        function pcmToWav(pcmData, sampleRate) {
            const buffer = new ArrayBuffer(44 + pcmData.length);
            const view = new DataView(buffer);
            const writeString = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
            writeString(0, 'RIFF'); view.setUint32(4, 36 + pcmData.length, true);
            writeString(8, 'WAVE'); writeString(12, 'fmt '); view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true);
            writeString(36, 'data'); view.setUint32(40, pcmData.length, true);
            for (let i = 0; i < pcmData.length; i++) view.setUint8(44 + i, pcmData[i]);
            return new Blob([buffer], { type: 'audio/wav' });
        }

        function App() {
            const [isJoined, setIsJoined] = useState(false);
            const [kitchenId, setKitchenId] = useState("");
            const [items, setItems] = useState([]);
            const [inputValue, setInputValue] = useState("");
            const [isAnalysing, setIsAnalysing] = useState(false);
            const [showCamera, setShowCamera] = useState(false);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);

            useEffect(() => { auth.onAuthStateChanged(u => { if(!u) auth.signInAnonymously(); }); }, []);
            useEffect(() => {
                if (!isJoined || !kitchenId) return;
                return db.collection(`artifacts/${appId}/public/data/${kitchenId}`).orderBy('created', 'desc').onSnapshot(s => {
                    setItems(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [isJoined, kitchenId]);

            const speak = async (text) => {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${apiKey}`, {
                        method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text }] }], generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } } })
                    });
                    const data = await res.json();
                    const audio = new Audio(URL.createObjectURL(pcmToWav(Uint8Array.from(atob(data.candidates[0].content.parts[0].inlineData.data), c => c.charCodeAt(0)), 24000)));
                    audio.play();
                } catch (e) { console.error(e); }
            };

            const startCamera = async () => {
                setShowCamera(true);
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                if (videoRef.current) videoRef.current.srcObject = stream;
            };

            const capture = async () => {
                setIsAnalysing(true);
                const canvas = canvasRef.current;
                const video = videoRef.current;
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const base64 = canvas.toDataURL('image/png').split(',')[1];
                video.srcObject.getTracks().forEach(t => t.stop());
                setShowCamera(false);
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${apiKey}`, {
                        method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: "Item name only:" }, { inlineData: { mimeType: "image/png", data: base64 } }] }] })
                    });
                    const data = await res.json();
                    const name = data.candidates[0].content.parts[0].text.trim();
                    if (name) {
                        await db.collection(`artifacts/${appId}/public/data/${kitchenId}`).add({ name, created: Date.now() });
                        speak(`Added ${name}`);
                    }
                } catch (e) { console.error(e); }
                setIsAnalysing(false);
            };

            if (!isJoined) {
                return el('div', { className: "fixed inset-0 flex flex-col items-center justify-center p-10 bg-[#020617]" }, [
                    el('div', { className: "text-9xl mb-8 animate-[float_4s_ease-in-out_infinite]" }, "🥘"),
                    el('h1', { className: "text-6xl font-['Bungee'] crystal-text mb-12 text-center" }, "PANTRY PAL"),
                    el('input', { placeholder: "KITCHEN ID", className: "w-full max-w-xs p-6 rounded-[2rem] bg-white/5 border border-white/10 text-center mb-4 outline-none", onChange: e => setKitchenId(e.target.value.toUpperCase()) }),
                    el('button', { className: "w-full max-w-xs bg-emerald-500 text-black py-6 rounded-[2.5rem] font-black text-xl shadow-2xl", onClick: () => kitchenId && setIsJoined(true) }, "ACTIVATE")
                ]);
            }

            return el('div', { className: "min-h-screen bg-[#020617] pb-24" }, [
                el('header', { className: "pt-24 pb-32 text-center bg-gradient-to-br from-[#064e3b] to-[#022c22] rounded-b-[70px] shadow-2xl relative" }, [
                    el('h1', { className: "text-5xl font-['Bungee'] crystal-text uppercase" }, "PANTRY PAL"),
                    el('span', { className: "mt-4 inline-block px-4 py-1 rounded-full bg-black/20 text-[10px] font-black tracking-widest uppercase border border-white/5" }, `ID: ${kitchenId}`)
                ]),
                el('main', { className: "max-w-md mx-auto px-6 -mt-16 space-y-6" }, [
                    el('div', { className: "bg-slate-900/80 backdrop-blur-xl p-6 rounded-[3rem] border border-white/10 shadow-2xl space-y-4" }, [
                        el('div', { className: "flex gap-2" }, [
                            el('input', { placeholder: "Add item...", value: inputValue, className: "flex-1 bg-black/40 p-5 rounded-2xl text-white outline-none border border-white/5", onChange: e => setInputValue(e.target.value) }),
                            el('button', { onClick: async () => { if(!inputValue) return; await db.collection(`artifacts/${appId}/public/data/${kitchenId}`).add({ name: inputValue, created: Date.now() }); setInputValue(""); }, className: "bg-emerald-500 text-black w-14 h-14 rounded-2xl font-black" }, "+")
                        ]),
                        el('div', { className: "flex justify-around pt-2" }, [
                            el('button', { onClick: startCamera, className: "p-4 bg-white/5 rounded-2xl hover:bg-emerald-500/20" }, "👁️ Scan"),
                            el('button', { onClick: () => speak("AI Voice active"), className: "p-4 bg-white/5 rounded-2xl hover:bg-emerald-500/20" }, "🔊 Voice")
                        ])
                    ]),
                    el('div', { className: "space-y-3" }, items.map(i => el('div', { key: i.id, className: "bg-white/5 backdrop-blur-md p-6 rounded-[2.5rem] flex justify-between items-center border border-white/5 shadow-lg animate-[slideIn_0.3s_ease-out]" }, [
                        el('div', { className: "flex items-center gap-4" }, [
                            el('button', { onClick: () => speak(i.name), className: "opacity-40" }, "🔊"),
                            el('span', { className: "font-bold text-lg" }, i.name)
                        ]),
                        el('button', { onClick: () => db.collection(`artifacts/${appId}/public/data/${kitchenId}`).doc(i.id).delete(), className: "text-rose-500/40 px-4" }, "✕")
                    ])))
                ]),
                showCamera && el('div', { className: "fixed inset-0 z-50 bg-black flex flex-col items-center" }, [
                    el('video', { ref: videoRef, autoPlay: true, playsInline: true, className: "flex-1 w-full object-cover" }),
                    el('div', { className: "p-10 flex gap-4" }, [
                        el('button', { onClick: () => { videoRef.current.srcObject.getTracks().forEach(t => t.stop()); setShowCamera(false); }, className: "bg-white/20 px-8 py-4 rounded-2xl font-bold" }, "Back"),
                        el('button', { onClick: capture, disabled: isAnalysing, className: "bg-emerald-500 text-black px-12 py-4 rounded-2xl font-black" }, isAnalysing ? "..." : "Capture")
                    ]),
                    el('canvas', { ref: canvasRef, className: "hidden" })
                ]),
                el('style', null, `
                    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
                    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                    .crystal-text { background: linear-gradient(135deg, #fff 0%, #a7f3d0 50%, #fff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4)); }
                `)
            ]);
        }
        ReactDOM.createRoot(document.getElementById('root')).render(el(App));
    </script>
</body>
</html>
